version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: manga_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      REDIS_LOCAL_URL: redis://manga_redis:6379
    expose:
      - "5000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: manga_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST}
    container_name: manga_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # SSL certs từ Certbot trên VPS host
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      # Lần đầu deploy: thay thành nginx-http-only.conf để lấy cert
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
